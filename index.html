<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КТЭК - СКАДА v25 ОБЛАКО</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; margin: 0; padding: 10px; font-size: 11px; }
        .container { background: white; padding: 15px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 96vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #003366; color: white; padding: 8px 15px; border-radius: 4px; margin-bottom: 10px; }
        .btn-panel button, .btn-panel label { cursor: pointer; padding: 6px 12px; font-weight: bold; border: none; border-radius: 3px; background: #f8f9fa; color: #333; margin-left: 5px; font-size: 11px; }
        .btn-backup { background: #ffc107 !important; } .btn-import { background: #17a2b8 !important; color: white !important; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 8px 16px; cursor: pointer; border: none; background: #ddd; font-weight: bold; border-radius: 4px 4px 0 0; }
        .tab-btn.active { background: #003366; color: white; }
        .input-form { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; background: #f1f8e9; padding: 10px; border: 1px solid #c5e1a5; margin-bottom: 10px; border-radius: 4px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: bold; margin-bottom: 2px; }
        input, select { padding: 4px; border: 1px solid #999; border-radius: 3px; font-size: 11px; }
        .btn-main { background: #2e7d32; color: white; font-weight: bold; padding: 8px; border: none; border-radius: 3px; cursor: pointer; grid-column: span 6; }
        .table-wrapper { flex: 1; overflow: auto; border: 1px solid #6c757d; background: white; }
        table { width: 100%; min-width: 2500px; border-collapse: collapse; }
        th, td { border: 1px solid #6c757d; padding: 4px; text-align: center; }
        th { background: #dee2e6; position: sticky; top: 0; z-index: 10; height: 35px; }
        .tag-opres { background: #e3f2fd; color: #1565c0; font-weight: bold; padding: 1px 3px; border-radius: 3px; border: 1px solid #1565c0; }
        .btn-act { border: none; padding: 3px 6px; border-radius: 3px; cursor: pointer; font-weight: bold; color: white; font-size: 10px; margin: 1px; }
        #photo-viewer { position: fixed; top:5%; left:5%; width:90%; height:90%; background: white; z-index: 1000; display: none; border: 3px solid #003366; padding: 15px; overflow-y: auto; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .photo-grid img { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

<div id="photo-viewer">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Фото порыва</h3>
        <button onclick="document.getElementById('photo-viewer').style.display='none'" style="background:red; color:white; border:none; padding:10px; cursor:pointer;">❌ ЗАКРЫТЬ</button>
    </div>
    <div style="margin:10px 0; padding:10px; background:#eee;">
        <label>📸 Добавить: </label><input type="file" id="file-input" accept="image/*" onchange="uploadPhoto()">
    </div>
    <div class="photo-grid" id="photo-display"></div>
</div>

<div class="container">
    <div class="top-bar">
        <h2>🦾 КТЭК — СКАДА <span style="font-size:10px; font-weight:normal">v25 ОБЛАКО</span></h2>
        <div class="btn-panel">
            <button class="btn-backup" onclick="exportDB()">💾 БЭКАП БАЗЫ</button>
            <label class="btn-import">📂 ИМПОРТ (ДЖОНС)<input type="file" accept=".json" style="display:none" onchange="importSmart(event)"></label>
            <button onclick="location.reload()">🔄 ОБНОВИТЬ</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-act" onclick="switchTab('act')">⚠️ ТЕКУЩИЕ (<span id="c-act">0</span>)</button>
        <button class="tab-btn" id="btn-kap" onclick="switchTab('kap')">🚧 КАП. РЕМОНТ (<span id="c-kap">0</span>)</button>
        <button class="tab-btn" id="btn-cls" onclick="switchTab('cls')">✅ АРХИВ (<span id="c-cls">0</span>)</button>
    </div>

    <div class="input-form">
        <div class="input-group"><label>Источник:</label><select id="v2"><option>ТЭЦ</option><option>ТЭЦ-2</option><option>РК-3</option><option>К-2</option><option>К-3</option></select></div>
        <div class="input-group"><label>Участок:</label><select id="v4"><option>Ц-1</option><option>Ц-3</option><option>МС</option><option>КЖБИ</option><option>КСК</option></select></div>
        <div class="input-group"><label>Диаметр (мм):</label><input type="text" id="v-diam"></div>
        <div class="input-group"><label>ТК / Отпайка:</label><input type="text" id="v3"></div>
        <div class="input-group"><label>Дата обнар.:</label><input type="datetime-local" id="v5"></div>
        <div class="input-group"><label>Адрес:</label><input type="text" id="v7"></div>
        <div class="input-group"><label>Характер:</label><input type="text" id="v8"></div>
        <div class="input-group"><label>План на:</label><input type="date" id="v13"></div>
        <div class="input-group"><label>Срок устранения:</label><input type="text" id="v14"></div>
        <div class="input-group"><label>Факт устранения:</label><input type="datetime-local" id="v15"></div>
        <div class="input-group"><label>Мастер:</label><input type="text" id="v18"></div>
        <div class="input-group" style="flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="is-opres"> <label>ОПРЕССОВКА</label></div>
        <button id="main-btn" class="btn-main" onclick="saveEntry()">+ ДОБАВИТЬ / СОХРАНИТЬ В ОБЛАКО</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th><th>Ист.</th><th>ТК</th><th>Уч.</th><th>Диам.</th><th>Обнаруж.</th><th>Адрес</th><th>Характер</th><th>План</th><th>Срок</th><th>Факт устранения</th><th>Мастер</th><th>Фото</th><th>Действия</th>
                </tr>
            </thead>
            <tbody id="tb-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://ktek-scada-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    
    let currentTab = 'act', editId = null, currentPhotoId = null;

    function saveEntry() {
        const id = editId || Date.now();
        const data = {
            id: id, status: editId ? undefined : 'act',
            v2: document.getElementById('v2').value, v4: document.getElementById('v4').value,
            diam: document.getElementById('v-diam').value, v3: document.getElementById('v3').value,
            v5: document.getElementById('v5').value, v7: document.getElementById('v7').value,
            v8: document.getElementById('v8').value, v13: document.getElementById('v13').value,
            v14: document.getElementById('v14').value, v15: document.getElementById('v15').value,
            v18: document.getElementById('v18').value, isOpres: document.getElementById('is-opres').checked
        };
        rdb.ref('poryvy/' + id).update(data).then(() => { alert("Готово!"); resetForm(); });
    }

    function resetForm() {
        editId = null; document.getElementById('main-btn').innerText = "+ ДОБАВИТЬ / СОХРАНИТЬ В ОБЛАКО";
        document.getElementById('main-btn').style.background = "#2e7d32";
        ['v-diam','v3','v5','v7','v8','v13','v14','v15','v18'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('is-opres').checked = false;
    }

    function editRow(item) {
        editId = item.id;
        document.getElementById('v2').value = item.v2 || ''; document.getElementById('v4').value = item.v4 || '';
        document.getElementById('v-diam').value = item.diam || ''; document.getElementById('v3').value = item.v3 || '';
        document.getElementById('v5').value = item.v5 || ''; document.getElementById('v7').value = item.v7 || '';
        document.getElementById('v8').value = item.v8 || ''; document.getElementById('v13').value = item.v13 || '';
        document.getElementById('v14').value = item.v14 || ''; document.getElementById('v15').value = item.v15 || '';
        document.getElementById('v18').value = item.v18 || ''; document.getElementById('is-opres').checked = !!item.isOpres;
        document.getElementById('main-btn').innerText = "💾 СОХРАНИТЬ ИЗМЕНЕНИЯ ID: " + item.id;
        document.getElementById('main-btn').style.background = "#0288d1";
        window.scrollTo(0,0);
    }

    function loadData() {
        rdb.ref('poryvy').on('value', s => {
            const data = s.val() || {};
            const body = document.getElementById('tb-body'); body.innerHTML = '';
            let c = {act:0, kap:0, cls:0};
            Object.values(data).sort((a,b) => b.id - a.id).forEach(item => {
                const st = item.status || 'act'; c[st]++;
                if(st !== currentTab) return;
                const row = `<tr>
                    <td>${String(item.id).slice(-4)}</td><td>${item.v2||''}</td><td>${item.v3||''}</td><td>${item.v4||''}</td><td>${item.diam||''}</td>
                    <td>${(item.v5||'').replace('T',' ')}</td><td style="text-align:left"><b>${item.v7||''}</b> ${item.isOpres?'<span class="tag-opres">ОПРЕССОВКА</span>':''}</td>
                    <td>${item.v8||''}</td><td>${item.v13||''}</td><td>${item.v14||''}</td><td>${(item.v15||'').replace('T',' ')}</td><td>${item.v18||''}</td>
                    <td><button class="btn-act" style="background:#0288d1" onclick="openPhotos('${item.id}')">📸 (${item.photos?Object.keys(item.photos).length:0})</button></td>
                    <td>
                        <button class="btn-act" style="background:#ff9800" onclick='editRow(${JSON.stringify(item)})'>✏️</button>
                        ${st==='act'? `<button class="btn-act" style="background:green" onclick="updStatus('${item.id}','cls')">✅</button><button class="btn-act" style="background:purple" onclick="updStatus('${item.id}','kap')">🚧</button>` : `<button class="btn-act" style="background:blue" onclick="updStatus('${item.id}','act')">↩️ Вернуть</button>`}
                        <button class="btn-act" style="background:red" onclick="if(confirm('Удалить?')) rdb.ref('poryvy/${item.id}').remove()">🗑️</button>
                    </td>
                </tr>`;
                body.insertAdjacentHTML('beforeend', row);
            });
            document.getElementById('c-act').innerText = c.act; document.getElementById('c-kap').innerText = c.kap; document.getElementById('c-cls').innerText = c.cls;
        });
    }

    function importSmart(event) {
        const reader = new FileReader();
        reader.onload = e => {
            const raw = JSON.parse(e.target.result);
            let toUpload = {};
            if(raw.act) raw.act.forEach(i => { i.status='act'; toUpload[i.id] = i; });
            if(raw.kap) raw.kap.forEach(i => { i.status='kap'; toUpload[i.id] = i; });
            if(raw.cls) raw.cls.forEach(i => { i.status='cls'; toUpload[i.id] = i; });
            rdb.ref('poryvy').update(toUpload).then(() => alert("Облако обновлено!"));
        };
        reader.readAsText(event.target.files[0]);
    }

    function updStatus(id, st) { rdb.ref('poryvy/'+id).update({status:st}); }
    function switchTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); loadData(); }
    function openPhotos(id) { currentPhotoId = id; document.getElementById('photo-viewer').style.display = 'block'; rdb.ref('poryvy/'+id+'/photos').on('value', s => {
        const grid = document.getElementById('photo-display'); grid.innerHTML = '';
        const phs = s.val() || {}; Object.values(phs).forEach(p => grid.insertAdjacentHTML('beforeend', `<img src="${p}">`));
    });}
    function uploadPhoto() { const file = document.getElementById('file-input').files[0]; const r = new FileReader(); r.onload = e => rdb.ref('poryvy/'+currentPhotoId+'/photos').push(e.target.result); r.readAsDataURL(file); }
    function exportDB() { rdb.ref('poryvy').once('value').then(s => { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(s.val(), null, 2)], {type: "application/json"})); a.download = `KTEK_BACKUP.json`; a.click(); }); }

    loadData();
</script>
</body>
</html>
