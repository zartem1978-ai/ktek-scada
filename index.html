<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КТЭК - СКАДА v27</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; margin: 0; padding: 10px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; overflow: hidden; font-size: 11px; }
        .container { background: white; padding: 15px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; flex: 1; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #003366; color: white; padding: 10px 15px; border-radius: 4px; margin-bottom: 10px; }
        .btn-panel button, .btn-panel label { cursor: pointer; padding: 6px 12px; font-weight: bold; border: 1px solid #ccc; border-radius: 3px; background: #f8f9fa; color: #333; margin-left: 5px; font-size: 11px; display: inline-block; }
        .btn-print { background: #0277bd !important; color: white !important; border: none !important; }
        .btn-backup { background: #ffc107 !important; color: #000 !important; border: none !important; }
        .btn-import { background: #17a2b8 !important; color: #fff !important; border: none !important; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 8px 16px; cursor: pointer; border: none; background: #ddd; font-weight: bold; border-radius: 4px 4px 0 0; }
        .tab-btn.active { background: #003366; color: white; }
        .search-input { width: 100%; padding: 8px 15px; font-size: 13px; border: 2px solid #003366; border-radius: 4px; box-sizing: border-box; background: #fff8e1; font-weight: bold; margin-bottom: 10px; }
        .input-form { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; background: #f1f8e9; padding: 10px 15px; border: 1px solid #c5e1a5; margin-bottom: 10px; border-radius: 4px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: bold; margin-bottom: 2px; font-size: 10px; }
        input, select { padding: 5px; border: 1px solid #999; border-radius: 3px; font-size: 11px; }
        .btn-add { background: #2e7d32; color: white; border: none; font-weight: bold; font-size: 12px; grid-column: span 6; padding: 8px; cursor: pointer; border-radius: 3px; }
        .table-wrapper { flex: 1; overflow: auto; border: 1px solid #6c757d; background: white; }
        table { width: 100%; min-width: 2500px; border-collapse: collapse; }
        th, td { border: 1px solid #6c757d; padding: 4px; text-align: center; }
        th { background: #dee2e6; position: sticky; top: 0; z-index: 10; height: 35px; }
        .tag-opres { background: #e3f2fd; color: #1565c0; font-weight: bold; border: 1px solid #1565c0; padding: 1px 3px; border-radius: 3px; font-size: 9px; }
        .btn-row { padding: 4px 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; font-weight: bold; margin: 0 2px; }
        
        /* Стили для печати */
        @media print {
            .no-print, .input-form, .tabs, .search-input, .btn-panel, .btn-row { display: none !important; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; border: none; width: 100%; height: auto; overflow: visible; }
            .table-wrapper { overflow: visible; height: auto; }
            table { min-width: 100%; width: 100%; font-size: 9px; border: 1px solid black; }
            th, td { border: 1px solid black !important; }
            th { background: #eee !important; color: black !important; position: static !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar no-print">
        <h2>🦾 КТЭК — СКАДА <span style="font-size:10px; font-weight:normal">v27</span></h2>
        <div class="btn-panel">
            <button class="btn-print" onclick="window.print()">🖨️ ПЕЧАТЬ</button>
            <button class="btn-backup" onclick="exportDB()">💾 БЭКАП БАЗЫ</button>
            <label class="btn-import">📂 ИМПОРТ<input type="file" accept=".json" style="display:none" onchange="importDB(event)"></label>
            <button onclick="location.reload()">🔄 ОБНОВИТЬ</button>
        </div>
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" id="btn-act" onclick="switchTab('act')">⚠️ ТЕКУЩИЕ (<span id="c-act">0</span>)</button>
        <button class="tab-btn" id="btn-kap" onclick="switchTab('kap')">🚧 КАП. РЕМОНТ (<span id="c-kap">0</span>)</button>
        <button class="tab-btn" id="btn-cls" onclick="switchTab('cls')">✅ АРХИВ (<span id="c-cls">0</span>)</button>
    </div>

    <div id="main-ui">
        <input type="text" id="searchInput" class="search-input no-print" placeholder="🔍 Поиск: адрес, ТК, мастер, диаметр..." oninput="render()">

        <div class="input-form no-print">
            <div class="input-group"><label>Источник:</label><select id="v2"><option>ТЭЦ</option><option>ТЭЦ-2</option><option>РК-3</option><option>К-2</option><option>К-3</option><option>БМК93</option></select></div>
            <div class="input-group"><label>Участок:</label><select id="v4"><option>Ц-1</option><option>Ц-3</option><option>МС</option><option>КЖБИ</option><option>КСК</option></select></div>
            <div class="input-group"><label>Диаметр (мм):</label><input type="text" id="v-diam"></div>
            <div class="input-group"><label>ТК / Отпайка:</label><input type="text" id="v3"></div>
            <div class="input-group"><label>Дата обнар.:</label><input type="datetime-local" id="v5"></div>
            <div class="input-group"><label>Адрес:</label><input type="text" id="v7"></div>
            <div class="input-group"><label>Характер порыва:</label><input type="text" id="v8"></div>
            <div class="input-group"><label>Примечание:</label><input type="text" id="v9"></div>
            <div class="input-group"><label>Откл. домов:</label><input type="number" id="v10"></div>
            <div class="input-group"><label>План на:</label><input type="date" id="v13"></div>
            <div class="input-group"><label>Срок (дней/часов):</label><input type="text" id="v14"></div>
            <div class="input-group"><label>Факт устранения:</label><input type="datetime-local" id="v15"></div>
            <div class="input-group"><label>Кто обнаружил:</label><input type="text" id="v17"></div>
            <div class="input-group"><label>Кто устранил (Мастер):</label><input type="text" id="v18"></div>
            <div class="input-group" style="flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="is-opres"> <label>ОПРЕССОВКА</label></div>
            <button class="btn-add" id="save-btn" onclick="saveEntry()">+ ДОБАВИТЬ / СОХРАНИТЬ ЗАПИСЬ</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>ID</th><th>Ист.</th><th>ТК</th><th>Уч.</th><th>Диам.</th><th>Обнаруж.</th><th>Адрес</th><th>Характер</th><th>Прим.</th><th>Дома</th><th>План</th><th>Срок</th><th>Факт</th><th>Мастер</th><th class="no-print">Действия</th></tr>
                </thead>
                <tbody id="tb-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ktek_scada_v27')) || { act: [], kap: [], cls: [], counter: 1 };
    let currentTab = 'act';
    let editIdx = null;

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+t).classList.add('active');
        render();
    }

    function saveEntry() {
        let entry = {
            v2: document.getElementById('v2').value, v3: document.getElementById('v3').value,
            v4: document.getElementById('v4').value, v5: document.getElementById('v5').value,
            v7: document.getElementById('v7').value, v8: document.getElementById('v8').value,
            v9: document.getElementById('v9').value, v10: document.getElementById('v10').value,
            v13: document.getElementById('v13').value, v14: document.getElementById('v14').value,
            v15: document.getElementById('v15').value, v17: document.getElementById('v17').value,
            v18: document.getElementById('v18').value, diam: document.getElementById('v-diam').value,
            isOpres: document.getElementById('is-opres').checked
        };

        if(editIdx !== null) {
            entry.id = db[currentTab][editIdx].id;
            db[currentTab][editIdx] = entry;
            editIdx = null;
            document.getElementById('save-btn').innerText = "+ ДОБАВИТЬ ЗАПИСЬ";
            document.getElementById('save-btn').style.background = "#2e7d32";
        } else {
            entry.id = db.counter++;
            db.act.push(entry);
        }
        save();
        // Очистка формы
        ['v-diam','v3','v5','v7','v8','v9','v10','v13','v14','v15','v17','v18'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('is-opres').checked = false;
    }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const body = document.getElementById('tb-body'); body.innerHTML = '';
        
        db[currentTab].forEach((r, i) => {
            if(query && !JSON.stringify(r).toLowerCase().includes(query)) return;
            let row = `<tr>
                <td>${r.id}</td><td>${r.v2||''}</td><td>${r.v3||''}</td><td>${r.v4||''}</td><td>${r.diam||''}</td>
                <td>${(r.v5||'').replace('T',' ')}</td><td style="text-align:left"><b>${r.v7||''}</b> ${r.isOpres?'<span class="tag-opres">ОПРЕССОВКА</span>':''}</td>
                <td>${r.v8||''}</td><td>${r.v9||''}</td><td>${r.v10||''}</td><td>${r.v13||''}</td><td>${r.v14||''}</td>
                <td>${(r.v15||'').replace('T',' ')}</td><td>${r.v18||''}</td>
                <td class="no-print">
                    <button class="btn-row" title="Редактировать" style="background:#ff9800; color:white" onclick="edit(${i})">✏️</button>
                    ${currentTab==='act'? 
                        `<button class="btn-row" title="Устранено (в архив)" style="background:green; color:white" onclick="move(${i},'cls')">✅</button>
                         <button class="btn-row" title="В кап. ремонт" style="background:purple; color:white" onclick="move(${i},'kap')">🚧</button>` : 
                        `<button class="btn-row" title="Вернуть в работу" style="background:blue; color:white" onclick="move(${i},'act')">↩️</button>`
                    }
                    <button class="btn-row" title="Удалить" style="background:red; color:white" onclick="del(${i})">🗑️</button>
                </td>
            </tr>`;
            body.insertAdjacentHTML('beforeend', row);
        });

        document.getElementById('c-act').innerText = db.act.length;
        document.getElementById('c-kap').innerText = db.kap.length;
        document.getElementById('c-cls').innerText = db.cls.length;
    }

    function edit(idx) {
        let r = db[currentTab][idx]; editIdx = idx;
        ['v2','v4','v3','v5','v7','v8','v9','v10','v13','v14','v15','v17','v18'].forEach(key => {
            if(document.getElementById(key)) document.getElementById(key).value = r[key] || '';
        });
        document.getElementById('v-diam').value = r.diam || '';
        document.getElementById('is-opres').checked = !!r.isOpres;
        document.getElementById('save-btn').innerText = "💾 СОХРАНИТЬ ИЗМЕНЕНИЯ (ID: "+r.id+")";
        document.getElementById('save-btn').style.background = "#0288d1";
        window.scrollTo(0,0);
    }

    function move(idx, to) {
        let msg = to === 'cls' ? "Порыв устранен? Перенести в архив?" : (to === 'kap' ? "Перенести в Капитальный ремонт?" : "Вернуть порыв в текущую работу?");
        if(confirm(msg)) {
            let item = db[currentTab].splice(idx,1)[0];
            db[to].push(item);
            save();
        }
    }

    function del(idx) {
        if(confirm('Удалить эту запись безвозвратно?')) {
            db[currentTab].splice(idx,1);
            save();
        }
    }

    function save() { localStorage.setItem('ktek_scada_v27', JSON.stringify(db)); render(); }
    
    function exportDB() {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db, null, 2)], {type: "application/json"}));
        a.download = `KTEK_BACKUP_${new Date().toLocaleDateString()}.json`; a.click();
    }

    function importDB(event) {
        const r = new FileReader();
        r.onload = e => { 
            let data = JSON.parse(e.target.result); 
            if(data.act) { db = data; save(); alert("✅ База успешно импортирована!"); }
        };
        r.readAsText(event.target.files[0]);
    }
    render();
</script>
</body>
</html>
