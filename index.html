<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КТЭК - СКАДА v31 МОНОЛИТ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; font-size: 11px; overflow: hidden; }
        .container { background: white; padding: 15px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #003366; color: white; padding: 10px 15px; border-radius: 4px; margin-bottom: 10px; }
        .btn-panel button, .btn-panel label { cursor: pointer; padding: 6px 12px; font-weight: bold; border: none; border-radius: 3px; background: #f8f9fa; color: #333; margin-left: 5px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 8px 16px; cursor: pointer; border: none; background: #ddd; font-weight: bold; border-radius: 4px 4px 0 0; }
        .tab-btn.active { background: #003366; color: white; }
        .input-form { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; background: #f1f8e9; padding: 10px; border: 1px solid #c5e1a5; margin-bottom: 10px; border-radius: 4px; }
        .input-group { display: flex; flex-direction: column; }
        input, select { padding: 4px; border: 1px solid #999; border-radius: 3px; font-size: 11px; }
        .btn-add { background: #2e7d32; color: white; border: none; font-weight: bold; font-size: 12px; grid-column: span 6; padding: 8px; cursor: pointer; border-radius: 3px; }
        .table-wrapper { flex: 1; overflow: auto; border: 1px solid #6c757d; background: white; }
        table { width: 100%; min-width: 2500px; border-collapse: collapse; }
        th, td { border: 1px solid #6c757d; padding: 4px; text-align: center; }
        th { background: #dee2e6; position: sticky; top: 0; z-index: 10; }
        .tag-opres { background: #e3f2fd; color: #1565c0; font-weight: bold; border: 1px solid #1565c0; padding: 1px 3px; border-radius: 3px; }
        .btn-row { padding: 3px 6px; cursor: pointer; border: none; border-radius: 3px; font-size: 10px; color: white; margin: 0 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h2>🦾 КТЭК — СКАДА <span style="font-size:10px; font-weight:normal">Разработка: Зиненко А.В.</span></h2>
        <div class="btn-panel">
            <button onclick="window.print()" style="background:#0277bd; color:white;">🖨️ ПЕЧАТЬ</button>
            <button onclick="exportDB()" style="background:#ffc107;">💾 БЭКАП</button>
            <label style="background:#17a2b8; color:white; padding:6px 12px; border-radius:3px; cursor:pointer;">📂 ИМПОРТ<input type="file" style="display:none" onchange="importToCloud(event)"></label>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('act', this)">⚠️ ТЕКУЩИЕ (<span id="c-act">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('kap', this)">🚧 КАП. РЕМОНТ (<span id="c-kap">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('cls', this)">✅ АРХИВ (<span id="c-cls">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('stat', this)" style="background:#0277bd; color:white; margin-left:20px;">📊 АНАЛИТИКА</button>
    </div>

    <div id="main-ui">
        <input type="text" id="searchInput" placeholder="🔍 Быстрый поиск по всей базе..." style="width:100%; padding:10px; border:2px solid #003366; border-radius:4px; margin-bottom:10px;" oninput="render()">

        <div class="input-form">
            <div class="input-group"><label>Источник:</label><select id="v2"><option>ТЭЦ</option><option>ТЭЦ-2</option><option>РК-3</option><option>К-2</option><option>К-3</option><option>БМК93</option></select></div>
            <div class="input-group"><label>Участок:</label><select id="v4"><option>Ц-1</option><option>Ц-3</option><option>МС</option><option>КЖБИ</option><option>КСК</option><option>РСУ</option></select></div>
            <div class="input-group"><label>Диаметр:</label><input type="text" id="v-diam"></div>
            <div class="input-group"><label>ТК:</label><input type="text" id="v3"></div>
            <div class="input-group"><label>Обнаружено:</label><input type="datetime-local" id="v5"></div>
            <div class="input-group"><label>Адрес:</label><input type="text" id="v7"></div>
            <div class="input-group"><label>Характер:</label><input type="text" id="v8"></div>
            <div class="input-group"><label>Примечание:</label><input type="text" id="v9"></div>
            <div class="input-group"><label>Домов:</label><input type="number" id="v10"></div>
            <div class="input-group"><label>План на:</label><input type="date" id="v13"></div>
            <div class="input-group"><label>Срок:</label><input type="text" id="v14"></div>
            <div class="input-group"><label>Факт:</label><input type="datetime-local" id="v15"></div>
            <div class="input-group"><label>Мастер:</label><input type="text" id="v18"></div>
            <div class="input-group" style="flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="is-opres"> <label>ОПРЕССОВКА</label></div>
            <button class="btn-add" id="save-btn" onclick="saveData()">+ СОХРАНИТЬ В ОБЛАКО</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>ID</th><th>Ист.</th><th>ТК</th><th>Уч.</th><th>Диам.</th><th>Обнаруж.</th><th>Адрес</th><th>Характер</th><th>Прим.</th><th>Домов</th><th>План</th><th>Срок</th><th>Факт</th><th>Мастер</th><th>Действия</th></tr>
                </thead>
                <tbody id="tb-body"></tbody>
            </table>
        </div>
    </div>

    <div id="stat-ui" style="display:none; padding:20px;">
        <div style="background:#f8f9fa; padding:20px; border-radius:5px; border-left:10px solid #003366;">
            <h2>📊 Сводная информация (ОНЛАЙН)</h2>
            <hr>
            <p style="font-size:16px">В работе порывов: <b id="s-act">0</b></p>
            <p style="font-size:16px; color:blue">Из них ОПРЕССОВКА: <b id="s-opres">0</b></p>
            <p style="font-size:16px; color:green">Всего в архиве: <b id="s-cls">0</b></p>
        </div>
    </div>
</div>

<script>
    // Инициализация Firebase (Твоё личное облако)
    const firebaseConfig = { databaseURL: "https://ktek-scada-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();

    let currentTab = 'act', editId = null, cloudData = {};

    function switchTab(t, btn) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('main-ui').style.display = (t === 'stat') ? 'none' : 'block';
        document.getElementById('stat-ui').style.display = (t === 'stat') ? 'block' : 'none';
        render();
    }

    function saveData() {
        const id = editId || Date.now();
        const data = {
            id: id,
            status: editId ? cloudData[id].status : 'act',
            v2: document.getElementById('v2').value, v4: document.getElementById('v4').value,
            v3: document.getElementById('v3').value, v5: document.getElementById('v5').value,
            v7: document.getElementById('v7').value, v8: document.getElementById('v8').value,
            v9: document.getElementById('v9').value, v10: document.getElementById('v10').value,
            v13: document.getElementById('v13').value, v14: document.getElementById('v14').value,
            v15: document.getElementById('v15').value, v18: document.getElementById('v18').value,
            diam: document.getElementById('v-diam').value, isOpres: document.getElementById('is-opres').checked
        };
        rdb.ref('poryvy/' + id).update(data).then(() => {
            alert("Синхронизировано!");
            editId = null;
            document.getElementById('save-btn').innerText = "+ СОХРАНИТЬ В ОБЛАКО";
            document.getElementById('save-btn').style.background = "#2e7d32";
            ['v-diam','v3','v5','v7','v8','v9','v10','v13','v14','v15','v18'].forEach(k => document.getElementById(k).value = '');
            document.getElementById('is-opres').checked = false;
        });
    }

    rdb.ref('poryvy').on('value', s => {
        cloudData = s.val() || {};
        render();
    });

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const body = document.getElementById('tb-body'); body.innerHTML = '';
        let c = {act:0, kap:0, cls:0, opres:0};

        Object.values(cloudData).sort((a,b) => b.id - a.id).forEach(r => {
            const st = r.status || 'act';
            c[st]++; if(st==='act' && r.isOpres) c.opres++;
            if(st !== currentTab) return;
            if(query && !JSON.stringify(r).toLowerCase().includes(query)) return;

            body.insertAdjacentHTML('beforeend', `<tr>
                <td>${String(r.id).slice(-4)}</td><td>${r.v2||''}</td><td>${r.v3||''}</td><td>${r.v4||''}</td><td>${r.diam||''}</td>
                <td>${(r.v5||'').replace('T',' ')}</td><td style="text-align:left"><b>${r.v7||''}</b> ${r.isOpres?'<span class="tag-opres">ОП</span>':''}</td>
                <td>${r.v8||''}</td><td>${r.v9||''}</td><td>${r.v10||''}</td><td>${r.v13||''}</td><td>${r.v14||''}</td>
                <td>${(r.v15||'').replace('T',' ')}</td><td>${r.v18||''}</td>
                <td>
                    <button class="btn-row" style="background:#ff9800" onclick="editRow('${r.id}')">✏️</button>
                    ${st==='act'? `<button class="btn-row" style="background:green" onclick="move('${r.id}','cls')">✅</button><button class="btn-row" style="background:purple" onclick="move('${r.id}','kap')">🚧</button>` : `<button class="btn-row" style="background:blue" onclick="move('${r.id}','act')">↩️</button>`}
                    <button class="btn-row" style="background:red" onclick="del('${r.id}')">🗑️</button>
                </td></tr>`);
        });
        document.getElementById('c-act').innerText = c.act; document.getElementById('c-kap').innerText = c.kap; document.getElementById('c-cls').innerText = c.cls;
        document.getElementById('s-act').innerText = c.act; document.getElementById('s-cls').innerText = c.cls; document.getElementById('s-opres').innerText = c.opres;
    }

    function editRow(id) {
        const r = cloudData[id]; editId = id;
        ['v2','v4','v3','v5','v7','v8','v9','v10','v13','v14','v15','v18'].forEach(k => document.getElementById(k).value = r[k] || '');
        document.getElementById('v-diam').value = r.diam || ''; document.getElementById('is-opres').checked = !!r.isOpres;
        document.getElementById('save-btn').innerText = "💾 ОБНОВИТЬ (ID: "+id+")";
        document.getElementById('save-btn').style.background = "#0288d1";
        window.scrollTo(0,0);
    }

    function move(id, to) { if(confirm("Изменить статус?")) rdb.ref('poryvy/'+id).update({status:to}); }
    function del(id) { if(confirm("Удалить навсегда?")) rdb.ref('poryvy/'+id).remove(); }

    function importToCloud(event) {
        const r = new FileReader();
        r.onload = e => {
            const raw = JSON.parse(e.target.result);
            let toUpload = {};
            if(raw.act) raw.act.forEach(i => { i.status='act'; toUpload[i.id || Date.now()+Math.random()] = i; });
            if(raw.kap) raw.kap.forEach(i => { i.status='kap'; toUpload[i.id || Date.now()+Math.random()] = i; });
            if(raw.cls) raw.cls.forEach(i => { i.status='cls'; toUpload[i.id || Date.now()+Math.random()] = i; });
            rdb.ref('poryvy').update(toUpload).then(() => alert("Облако загружено!"));
        };
        r.readAsText(event.target.files[0]);
    }

    function exportDB() {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([JSON.stringify(cloudData, null, 2)], {type: "application/json"}));
        a.download = `KTEK_SYNC_BACKUP.json`; a.click();
    }
</script>
</body>
</html>
