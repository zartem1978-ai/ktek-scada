<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КТЭК СКАДА ОНЛАЙН v11</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; margin: 0; padding: 10px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; overflow: hidden; font-size: 11px; }
        .container { background: white; padding: 15px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; flex: 1; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #003366; color: white; padding: 10px 15px; border-radius: 4px; margin-bottom: 10px; }
        .btn-panel { display: flex; align-items: center; gap: 5px; }
        .btn-panel button, .btn-panel label { cursor: pointer; padding: 6px 12px; font-weight: bold; border: none; border-radius: 3px; background: #f8f9fa; color: #333; font-size: 11px; }
        .btn-login { background: #d32f2f !important; color: white !important; }
        .btn-import { background: #f57c00 !important; color: white !important; display: none; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 8px 16px; cursor: pointer; border: none; background: #ddd; font-weight: bold; border-radius: 4px 4px 0 0; }
        .tab-btn.active { background: #003366; color: white; }
        .input-form { display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; background: #f1f8e9; padding: 10px; border: 1px solid #c5e1a5; margin-bottom: 10px; border-radius: 4px; }
        .input-group { display: flex; flex-direction: column; position: relative; }
        .input-group label { font-weight: bold; font-size: 9px; margin-bottom: 2px; }
        .input-form input, .input-form select { padding: 5px; border: 1px solid #999; border-radius: 3px; font-size: 11px; }
        .btn-add { background: #2e7d32; color: white; border: none; font-weight: bold; grid-column: span 6; padding: 8px; cursor: pointer; margin-top: 5px; }
        .table-wrapper { flex: 1; overflow: auto; border: 1px solid #6c757d; }
        table { width: 100%; min-width: 2000px; border-collapse: collapse; }
        th, td { border: 1px solid #6c757d; padding: 4px; text-align: center; }
        th { background: #dee2e6; position: sticky; top: 0; z-index: 5; }
        .online-status { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: #2e7d32; color: white; }
        .autocomplete-items { position: absolute; border: 1px solid #d4d4d4; z-index: 99; top: 100%; left: 0; right: 0; background: white; max-height: 150px; overflow-y: auto; color: #000; }
        .autocomplete-items div { padding: 8px; cursor: pointer; border-bottom: 1px solid #d4d4d4; }
        .autocomplete-items div:hover { background-color: #e9e9e9; }
        .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }
        /* Аналитика */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .stat-card { background: #f8f9fa; padding: 10px; border-left: 5px solid #003366; }
        .chart-box { background: white; border: 1px solid #ccc; padding: 10px; height: 180px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h2>🦾 КТЭК СКАДА ОНЛАЙН <span id="conn-status" class="online-status" style="background:#757575">СВЯЗЬ...</span></h2>
        <div class="btn-panel">
            <label id="btn-import-cloud" class="btn-import">📥 ЗАЛИТЬ АРХИВ (JSON)<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
            <button onclick="window.print()">🖨️ ПЕЧАТЬ</button>
            <button id="btn-login" class="btn-login" onclick="login()">🔑 ВОЙТИ</button>
            <button id="btn-logout" style="display:none" onclick="logout()">🚪 ВЫЙТИ</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('act')">⚠️ ТЕКУЩИЕ (<span id="c-act">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('kap')">🚧 КАП. РЕМОНТ (<span id="c-kap">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('cls')">✅ АРХИВ (<span id="c-cls">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('stat')" style="background:#0277bd; color:white; margin-left:20px;">📊 АНАЛИТИКА</button>
    </div>

    <div id="search-block"><input type="text" id="searchInput" class="search-input" style="width:100%; padding:8px; margin-bottom:10px; border:2px solid #003366;" placeholder="🔍 Поиск по адресу, ID или мастеру..." oninput="renderTables()"></div>

    <div class="input-form" id="input-block">
        <div class="input-group"><label>Источник:</label><select id="v2"><option>ТЭЦ</option><option>ТЭЦ-2</option><option>РК-3</option><option>К-2</option><option>К-3</option><option>БМК93</option></select></div>
        <div class="input-group"><label>Участок:</label><select id="v4"><option>Ц-1</option><option>Ц-3</option><option>МС</option><option>КЖБИ</option><option>КСК</option><option>РСУ</option><option>ГИДТС</option></select></div>
        <div class="input-group"><label>Диаметр:</label><input type="number" id="v_dia" placeholder="мм"></div>
        <div class="input-group"><label>Адрес (ул):</label><input type="text" id="v7" autocomplete="off"></div>
        <div class="input-group"><label>ТК:</label><input type="text" id="v3"></div>
        <div class="input-group"><label>Обнаруж:</label><input type="datetime-local" id="v5"></div>
        <div class="input-group"><label>Отключ:</label><input type="datetime-local" id="v6"></div>
        <div class="input-group"><label>Характер:</label><input type="text" id="v8"></div>
        <div class="input-group"><label>Дома:</label><input type="number" id="v10"></div>
        <div class="input-group"><label>Мастер:</label><input type="text" id="v18"></div>
        <div class="input-group"><label>Тип:</label><select id="v_type"><option value="авария">Авария</option><option value="капремонт">Капремонт</option><option value="инвест">Инвест</option></select></div>
        <button class="btn-add" onclick="saveEntry()">+ ДОБАВИТЬ В БАЗУ КТЭК</button>
    </div>

    <div id="tab-act" class="tab-content active"><div class="table-wrapper"><table><thead><tr id="h-act"></tr></thead><tbody id="tb-act"></tbody></table></div></div>
    <div id="tab-kap" class="tab-content"><div class="table-wrapper"><table><thead><tr id="h-kap"></tr></thead><tbody id="tb-kap"></tbody></table></div></div>
    <div id="tab-cls" class="tab-content"><div class="table-wrapper"><table><thead><tr id="h-cls"></tr></thead><tbody id="tb-cls"></tbody></table></div></div>

    <div id="tab-stat" class="tab-content">
        <div style="background:#e3f2fd; padding:10px; margin-bottom:10px;">
            <b>📅 ОТЧЕТ С:</b> <input type="date" id="d-from" onchange="renderStats()"> <b>ПО:</b> <input type="date" id="d-to" onchange="renderStats()">
        </div>
        <div class="stat-grid">
            <div class="stat-card"><h4>Всего</h4><div id="s-total" style="font-size:18px; font-weight:bold;">0</div></div>
            <div class="stat-card"><h4>Аварии</h4><div id="s-av" style="font-size:18px; font-weight:bold; color:red;">0</div></div>
            <div class="stat-card"><h4>Дома</h4><div id="s-h" style="font-size:18px; font-weight:bold;">0</div></div>
            <div class="stat-card"><h4>Ср. время</h4><div id="s-tm" style="font-size:18px; font-weight:bold;">0</div></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px;">
            <div class="chart-box"><h4>Мастера</h4><div id="c-m"></div></div>
            <div class="chart-box"><h4>Улицы</h4><div id="c-s"></div></div>
            <div class="chart-box"><h4>Диаметры</h4><div id="c-d"></div></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQauR_WF76SnqAnpoPxanT4xMUsaDf0Z8",
        authDomain: "poryve.firebaseapp.com",
        databaseURL: "https://teploset-19a06-default-rtdb.firebaseio.com",
        projectId: "poryve",
        storageBucket: "poryve.firebasestorage.app",
        messagingSenderId: "767130185323",
        appId: "1:767130185323:web:4ff50552a37c54a3788b2e"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const ADMIN_PASSWORD = "ktek2026";
    let isAdmin = false;
    let db = { act: [], kap: [], cls: [], counter: 1000 };
    const streets = ["Абая", "Аль-Фараби", "Баймагамбетова", "Бородина", "Гагарина", "Гоголя", "Дзержинского", "Дощанова", "Каирбекова", "Карбышева", "Майлина", "Назарбаева", "Победы", "Пушкина", "Тауелсиздик", "Чкалова"];

    function login() {
        if(prompt("Пароль:") === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById('btn-login').style.display = 'none';
            document.getElementById('btn-logout').style.display = 'block';
            document.getElementById('btn-import-cloud').style.display = 'block';
            document.getElementById('input-block').style.display = 'grid';
            renderTables();
        }
    }

    function logout() { location.reload(); }

    database.ref('ktek_scada').on('value', (s) => {
        if(s.val()) db = s.val();
        document.getElementById('conn-status').innerText = "ОНЛАЙН 🟢";
        document.getElementById('conn-status').style.background = "#2e7d32";
        renderTables();
        renderStats();
    });

    function sync() { database.ref('ktek_scada').set(db); }

    function importData(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(f) {
            db = JSON.parse(f.target.result);
            sync();
            alert("Архив успешно залит в облако!");
        };
        reader.readAsText(file);
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        document.getElementById('input-block').style.display = (isAdmin && t !== 'stat') ? 'grid' : 'none';
        event.target.classList.add('active');
    }

    function saveEntry() {
        let entry = {
            id: db.counter++,
            v2: document.getElementById('v2').value, v4: document.getElementById('v4').value,
            v3: document.getElementById('v3').value, v5: document.getElementById('v5').value,
            v6: document.getElementById('v6').value, v7: document.getElementById('v7').value,
            v8: document.getElementById('v8').value, v10: document.getElementById('v10').value,
            v18: document.getElementById('v18').value, v_dia: document.getElementById('v_dia').value,
            v_type: document.getElementById('v_type').value, v15: ""
        };
        if(entry.v_type !== 'авария') db.kap.push(entry); else db.act.push(entry);
        sync();
        document.querySelectorAll('.input-form input').forEach(i => i.value = "");
    }

    function finish(idx, type) {
        let item = db[type].splice(idx, 1)[0];
        item.v15 = new Date().toISOString().slice(0,16);
        db.cls.unshift(item);
        sync();
    }

    const h = `<th>ID</th><th>Ист.</th><th>Уч.</th><th>Диам.</th><th>Адрес</th><th>ТК</th><th>Обнаруж.</th><th>Отключ.</th><th>Характер</th><th>Дома</th><th>Факт</th><th>Мастер</th>`;

    function renderTables() {
        let q = document.getElementById('searchInput').value.toLowerCase();
        const dr = (bid, list, type) => {
            let html = '';
            (list || []).forEach((r, i) => {
                if(q && !`${r.v7} ${r.id} ${r.v18}`.toLowerCase().includes(q)) return;
                let btn = isAdmin ? `<td><button onclick="finish(${i},'${type}')">✅</button></td>` : '';
                html += `<tr><td>${r.id}</td><td>${r.v2}</td><td>${r.v4}</td><td>${r.v_dia||''}</td><td>${r.v7}</td><td>${r.v3}</td><td>${r.v5}</td><td>${r.v6}</td><td>${r.v8}</td><td>${r.v10}</td><td>${r.v15}</td><td>${r.v18}</td>${btn}</tr>`;
            });
            document.getElementById(bid).innerHTML = html;
        };
        document.getElementById('h-act').innerHTML = h + (isAdmin?'<th>OK</th>':'');
        document.getElementById('h-kap').innerHTML = h + (isAdmin?'<th>OK</th>':'');
        document.getElementById('h-cls').innerHTML = h;
        dr('tb-act', db.act, 'act'); dr('tb-kap', db.kap, 'kap'); dr('tb-cls', db.cls, 'cls');
        document.getElementById('c-act').innerText = (db.act||[]).length;
        document.getElementById('c-kap').innerText = (db.kap||[]).length;
        document.getElementById('c-cls').innerText = (db.cls||[]).length;
    }

    function renderStats() {
        let f = document.getElementById('d-from').value, t = document.getElementById('d-to').value;
        let all = (db.cls || []).concat(db.act || []).concat(db.kap || []);
        let fil = all.filter(r => (!f || r.v5 >= f) && (!t || r.v5 <= t));
        document.getElementById('s-total').innerText = fil.length;
        document.getElementById('s-av').innerText = fil.filter(r=>r.v_type==='авария').length;
        let hs = 0; fil.forEach(r => hs += parseInt(r.v10)||0); document.getElementById('s-h').innerText = hs;
        let m={}, s={}, d={};
        fil.forEach(r => { if(r.v18) m[r.v18]=(m[r.v18]||0)+1; if(r.v7) s[r.v7]=(s[r.v7]||0)+1; if(r.v_dia) d[r.v_dia]=(d[r.v_dia]||0)+1; });
        const bl = (o, id) => {
            let k = Object.keys(o).sort((a,b)=>o[b]-o[a]); let h='';
            k.forEach(x => h+=`<div class="chart-row"><span>${x}</span><b>${o[x]}</b></div>`);
            document.getElementById(id).innerHTML = h || '--';
        };
        bl(m, 'c-m'); bl(s, 'c-s'); bl(d, 'c-d');
    }

    // Автокомплит улиц
    document.getElementById('v7').addEventListener('input', function() {
        let v = this.value, list = streets.filter(s => s.toLowerCase().includes(v.toLowerCase()));
        let box = document.getElementById('addr-box') || document.createElement('div');
        box.id = 'addr-box'; box.className = 'autocomplete-items'; this.parentNode.appendChild(box);
        box.innerHTML = ''; if(!v) return box.remove();
        list.forEach(s => {
            let d = document.createElement('div'); d.innerText = s;
            d.onclick = () => { document.getElementById('v7').value = s; box.remove(); };
            box.appendChild(d);
        });
    });
</script>
</body>
</html>
