<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КТЭК - СКАДА Диспетчера v23</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; margin: 0; padding: 10px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; overflow: hidden; font-size: 11px; }
        .container { background: white; padding: 15px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; flex: 1; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #003366; color: white; padding: 10px 15px; border-radius: 4px; margin-bottom: 10px; }
        .btn-panel button, .btn-panel label { cursor: pointer; padding: 6px 12px; font-weight: bold; border: 1px solid #ccc; border-radius: 3px; background: #f8f9fa; color: #333; margin-left: 5px; font-size: 11px; display: inline-block; }
        .btn-backup { background: #ffc107 !important; color: #000 !important; border: none !important; }
        .btn-import { background: #17a2b8 !important; color: #fff !important; border: none !important; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 8px 16px; cursor: pointer; border: none; background: #ddd; font-weight: bold; border-radius: 4px 4px 0 0; }
        .tab-btn.active { background: #003366; color: white; }
        .search-input { width: 100%; padding: 8px 15px; font-size: 13px; border: 2px solid #003366; border-radius: 4px; box-sizing: border-box; background: #fff8e1; font-weight: bold; margin-bottom: 10px; }
        .input-form { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; background: #f1f8e9; padding: 10px 15px; border: 1px solid #c5e1a5; margin-bottom: 10px; border-radius: 4px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: bold; margin-bottom: 2px; font-size: 10px; }
        input, select { padding: 5px; border: 1px solid #999; border-radius: 3px; font-size: 11px; }
        .btn-add { background: #2e7d32; color: white; border: none; font-weight: bold; font-size: 12px; grid-column: span 6; padding: 8px; cursor: pointer; border-radius: 3px; }
        .table-wrapper { flex: 1; overflow: auto; border: 1px solid #6c757d; background: white; }
        table { width: 100%; min-width: 2200px; border-collapse: collapse; }
        th, td { border: 1px solid #6c757d; padding: 4px; text-align: center; }
        th { background: #dee2e6; position: sticky; top: 0; z-index: 10; height: 35px; }
        .tag-opres { background: #e3f2fd; color: #1565c0; font-weight: bold; border: 1px solid #1565c0; padding: 1px 3px; border-radius: 3px; font-size: 9px; }
        .btn-photo { background: #0288d1; color: white; border: none; padding: 3px 6px; cursor: pointer; border-radius: 3px; font-size: 9px; }
        #photo-viewer { position: fixed; top:5%; left:5%; width:90%; height:90%; background: white; z-index: 1000; display: none; border: 3px solid #003366; padding: 15px; overflow-y: auto; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .photo-grid img { width: 100%; border-radius: 5px; border: 1px solid #ddd; }
        /* Аналитика */
        #tab-stat { display: none; overflow-y: auto; padding: 10px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 5px; border-left: 5px solid #003366; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="photo-viewer">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Фото порыва</h3>
        <button onclick="document.getElementById('photo-viewer').style.display='none'" style="background:red; color:white; border:none; padding:10px; cursor:pointer;">❌ ЗАКРЫТЬ</button>
    </div>
    <div style="margin:10px 0; padding:10px; background:#eee;">
        <label>📸 Добавить фото: </label><input type="file" id="file-input" accept="image/*" onchange="uploadPhotoLocal()">
    </div>
    <div class="photo-grid" id="photo-display"></div>
</div>

<div class="container">
    <div class="top-bar no-print">
        <h2>🦾 КТЭК — СКАДА <span style="font-size:10px; font-weight:normal">Разработка: Зиненко А.В.</span></h2>
        <div class="btn-panel">
            <button class="btn-backup" onclick="exportDB()">💾 БЭКАП БАЗЫ</button>
            <label class="btn-import">📂 ИМПОРТ (ДЖОНС)<input type="file" accept=".json" style="display:none" onchange="importDB(event)"></label>
            <button onclick="location.reload()">🔄 ОБНОВИТЬ</button>
        </div>
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" onclick="switchTab('act')">⚠️ ТЕКУЩИЕ ПОРЫВЫ (<span id="c-act">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('kap')">🚧 КАП. РЕМОНТ (<span id="c-kap">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('cls')">✅ АРХИВ (<span id="c-cls">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('stat')" style="background:#0277bd; color:white; margin-left:20px;">📊 АНАЛИТИКА</button>
    </div>

    <div id="main-ui">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Умный поиск: адрес, ТК, мастер..." oninput="render()">

        <div class="input-form no-print">
            <div class="input-group"><label>Источник:</label><select id="v2"><option>ТЭЦ</option><option>ТЭЦ-2</option><option>РК-3</option><option>К-2</option><option>К-3</option></select></div>
            <div class="input-group"><label>Участок:</label><select id="v4"><option>Ц-1</option><option>Ц-3</option><option>МС</option><option>КЖБИ</option><option>КСК</option></select></div>
            <div class="input-group"><label>Диаметр (мм):</label><input type="text" id="v-diam"></div>
            <div class="input-group"><label>ТК / Отпайка:</label><input type="text" id="v3"></div>
            <div class="input-group"><label>Дата обнар.:</label><input type="datetime-local" id="v5"></div>
            <div class="input-group"><label>Адрес:</label><input type="text" id="v7"></div>
            <div class="input-group"><label>Характер:</label><input type="text" id="v8"></div>
            <div class="input-group"><label>Примечание:</label><input type="text" id="v9"></div>
            <div class="input-group"><label>Домов:</label><input type="number" id="v10"></div>
            <div class="input-group"><label>План на:</label><input type="date" id="v13"></div>
            <div class="input-group"><label>Срок устранения:</label><input type="text" id="v14"></div>
            <div class="input-group"><label>Мастер (устранил):</label><input type="text" id="v18"></div>
            <div class="input-group" style="flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="is-opres"> <label>ОПРЕССОВКА</label></div>
            <button class="btn-add" onclick="saveEntry()">+ ДОБАВИТЬ НОВУЮ ЗАПИСЬ</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>ID</th><th>Ист.</th><th>ТК</th><th>Уч.</th><th>Диам.</th><th>Обнаруж.</th><th>Адрес</th><th>Характер</th><th>Прим.</th><th>Домов</th><th>План</th><th>Срок</th><th>Мастер</th><th>Фото</th><th>Действия</th></tr>
                </thead>
                <tbody id="tb-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-stat">
        <div class="stat-card"><h4>Всего в работе порывов:</h4><div class="value" id="s-act" style="font-size:24px">0</div></div>
        <div class="stat-card"><h4>Из них после ОПРЕССОВКИ:</h4><div class="value" id="s-opres" style="color:#1565c0; font-size:24px">0</div></div>
        <div class="stat-card"><h4>Всего в архиве:</h4><div class="value" id="s-cls" style="color:#2e7d32; font-size:24px">0</div></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ktek_scada_v23')) || { act: [], kap: [], cls: [], counter: 1 };
    let currentTab = 'act';
    let currentPhotoObj = null;

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(event) event.target.classList.add('active');
        document.getElementById('main-ui').style.display = (t === 'stat') ? 'none' : 'flex';
        document.getElementById('tab-stat').style.display = (t === 'stat') ? 'block' : 'none';
        render();
    }

    function saveEntry() {
        let entry = {
            id: db.counter++,
            v2: document.getElementById('v2').value, v3: document.getElementById('v3').value,
            v4: document.getElementById('v4').value, v5: document.getElementById('v5').value,
            v7: document.getElementById('v7').value, v8: document.getElementById('v8').value,
            v9: document.getElementById('v9').value, v10: document.getElementById('v10').value,
            v13: document.getElementById('v13').value, v14: document.getElementById('v14').value,
            v18: document.getElementById('v18').value, diam: document.getElementById('v-diam').value,
            isOpres: document.getElementById('is-opres').checked, photos: []
        };
        db.act.push(entry);
        saveAndRender();
        alert("Запись добавлена!");
    }

    function move(idx, to) {
        let item = db[currentTab].splice(idx, 1)[0];
        db[to].push(item);
        saveAndRender();
    }

    function saveAndRender() { localStorage.setItem('ktek_scada_v23', JSON.stringify(db)); render(); }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const body = document.getElementById('tb-body'); body.innerHTML = '';
        
        db[currentTab].forEach((r, i) => {
            if(query && !JSON.stringify(r).toLowerCase().includes(query)) return;
            let row = `<tr>
                <td>${r.id}</td><td>${r.v2||''}</td><td>${r.v3||''}</td><td>${r.v4||''}</td><td>${r.diam||''}</td>
                <td>${(r.v5||'').replace('T',' ')}</td>
                <td style="text-align:left"><b>${r.v7||''}</b> ${r.isOpres?'<span class="tag-opres">ОПРЕССОВКА</span>':''}</td>
                <td>${r.v8||''}</td><td>${r.v9||''}</td><td>${r.v10||''}</td><td>${r.v13||''}</td><td>${r.v14||''}</td><td>${r.v18||''}</td>
                <td><button class="btn-photo" onclick="openPhotosLocal(${i})">📸 (${r.photos?r.photos.length:0})</button></td>
                <td>
                    ${currentTab==='act'? `<button onclick="move(${i},'cls')" style="background:green; color:white; border:none; cursor:pointer;">✅</button> <button onclick="move(${i},'kap')" style="background:purple; color:white; border:none; cursor:pointer;">🚧</button>` : `<button onclick="move(${i},'act')">↩️</button>`}
                    <button onclick="if(confirm('Удалить?')){db[currentTab].splice(${i},1);saveAndRender();}" style="background:red; color:white; border:none; cursor:pointer;">🗑️</button>
                </td>
            </tr>`;
            body.insertAdjacentHTML('beforeend', row);
        });

        document.getElementById('c-act').innerText = db.act.length;
        document.getElementById('c-kap').innerText = db.kap.length;
        document.getElementById('c-cls').innerText = db.cls.length;
        document.getElementById('s-act').innerText = db.act.length;
        document.getElementById('s-cls').innerText = db.cls.length;
        document.getElementById('s-opres').innerText = db.act.filter(x => x.isOpres).length;
    }

    function openPhotosLocal(idx) {
        currentPhotoObj = db[currentTab][idx];
        document.getElementById('photo-viewer').style.display = 'block';
        const grid = document.getElementById('photo-display'); grid.innerHTML = '';
        if(!currentPhotoObj.photos) currentPhotoObj.photos = [];
        currentPhotoObj.photos.forEach(p => grid.insertAdjacentHTML('beforeend', `<img src="${p}">`));
    }

    function uploadPhotoLocal() {
        const file = document.getElementById('file-input').files[0];
        const reader = new FileReader();
        reader.onload = e => {
            currentPhotoObj.photos.push(e.target.result);
            saveAndRender();
            openPhotosLocal(db[currentTab].indexOf(currentPhotoObj));
        };
        reader.readAsDataURL(file);
    }

    function exportDB() {
        const blob = new Blob([JSON.stringify(db, null, 2)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `KTEK_JOHNSON_${new Date().toLocaleDateString()}.json`; a.click();
    }

    function importDB(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = e => {
            try {
                let raw = JSON.parse(e.target.result);
                // Если формат старый (просто массивы), подставляем его
                if(raw.act) { db = raw; saveAndRender(); alert("✅ База 'Джонс' успешно подтянута!"); }
            } catch(err) { alert("Ошибка файла!"); }
        };
        reader.readAsText(file);
    }

    render();
</script>
</body>
</html>
